version: '3.8'

services:
    build::
  neural-edge .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - CAMERA_URL=0
      - EDGE_MODE=true
    command: python web_server.py
    restart: unless-stopped

  neural-edge2:
    # 多摄像头模拟
    build: .
    ports:
      - "5001:5000"
    environment:
      - CAMERA_URL=1
    command: python edge_node.py
    restart: unless-stopped
