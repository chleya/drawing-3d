# Docker Compose for Drawing 3D
# Includes PostgreSQL and Neo4j

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: drawing3d-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/drawing3d
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: drawing3d-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=drawing3d
      - POSTGRES_PASSWORD=drawing3d123
      - POSTGRES_DB=drawing3d
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawing3d"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Application
  web:
    build: .
    container_name: drawing3d-web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://drawing3d:drawing3d123@postgres:5432/drawing3d
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=drawing3d
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
